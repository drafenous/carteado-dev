<div
  class="surface-panel group flex flex-col text-center text-[var(--text-strong)] rounded-md p-3 sm:p-4 hover:shadow-xl transition-all relative"
>
  @if (isAdmin()) {
  <div class="absolute right-1 top-1 z-20" #OptionsMenu>
    <app-tooltip text="Options">
      <button
        type="button"
      class="opacity-25 group-hover:opacity-100 text-[var(--text-muted)]"
        (click)="handleToggleShowOptions()"
      >
        <fa-icon [icon]="ICONS.options" [fixedWidth]="true" [size]="'1x'" />
      </button>
    </app-tooltip>
    <app-context-menu
      [isShown]="!!(showContextMenu$ | async)"
      [user]="user()"
      (kickUserEvent)="handleKick($event)"
      (closeContextMenu)="handleToggleShowOptions(false)"
    ></app-context-menu>
  </div>
  }
  <div class="relative inline-flex w-20 h-20 items-center justify-center mx-auto">
    @if (isSpectator()) {
    <span
      class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-neutral-700 text-white"
      aria-label="Spectator"
      title="Spectator"
    >
      <fa-icon [icon]="ICONS.spectator" [size]="'2x'" />
    </span>
    } @else {
    <fa-icon
      [icon]="ICONS.userCircle"
      [fixedWidth]="true"
      [size]="'4x'"
      class=""
    />
    }
    @if (hasVoted()) {
    <span
      class="absolute -bottom-0.5 -right-0.5 inline-flex items-center justify-center w-5 h-5 rounded-full bg-green-600 text-white border-2 border-white"
      aria-label="Has voted"
      title="Has voted"
    >
      <fa-icon [icon]="ICONS.voted" [size]="'xs'" />
    </span>
    }
  </div>
  <div class="mt-3 sm:mt-4 text-sm sm:text-base">
    {{ user().name }}
  </div>
  @if (displayRole(); as role) {
  <div class="mt-1 text-sm text-[var(--text-muted)]">
    {{ role }}
  </div>
  }
</div>
