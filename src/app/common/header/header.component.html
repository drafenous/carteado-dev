<header class="h-16 w-full sticky top-2">
  <div
    class="container flex justify-between mx-auto h-full bg-neutral-950/10 px-8 rounded-3xl backdrop-blur overflow-hidden"
  >
    <div class="site-logo h-full flex align-middle items-center">
      <span> Carteado Dev </span>
    </div>
    <nav class="flex align-middle">
      <button
        type="button"
        [routerLink]="'/'"
        class="hover:bg-neutral-950/20 px-4 transition-all"
      >
        <fa-icon [icon]="ICONS.home" [fixedWidth]="true" />
        <div class="hidden sm:block">Home</div>
      </button>
      <button type="button" class="hover:bg-neutral-950/10 px-4 transition-all">
        <fa-icon [icon]="ICONS.createRoom" [fixedWidth]="true" />
        <div class="hidden sm:block">Create a room</div>
      </button>
      <button type="button" class="hover:bg-neutral-950/10 px-4 transition-all">
        <fa-icon [icon]="ICONS.joinRoom" [fixedWidth]="true" />
        <div class="hidden sm:block">Join a room</div>
      </button>
      <button
        type="button"
        [routerLink]="'about'"
        class="hover:bg-neutral-950/10 px-4 transition-all"
      >
        <fa-icon [icon]="ICONS.about" [fixedWidth]="true" />
        <div class="hidden sm:block">About</div>
      </button>
    </nav>
  </div>
</header>
