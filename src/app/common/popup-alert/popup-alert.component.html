@if(showAlert()){
<div
  #PopupAlertBackdrop
  class="bg-black/50 fixed top-0 left-0 w-screen h-screen z-30 flex items-center justify-center"
>
  <div
    #PopupAletBox
    class="bg-white/50 backdrop-blur-md fixed z-50 w-auto p-4 rounded-3xl overflow-hidden shadow-lg"
  >
    <div class="mb-4">
      <h1 class="text-center text-4xl">
        <ng-content select="[title]"></ng-content>
      </h1>
    </div>
    <div class="mb-4">
      <ng-content select="[body]"></ng-content>
    </div>
    <div class="">
      <ng-content select="[actions]"></ng-content>
    </div>
  </div>
</div>
}
