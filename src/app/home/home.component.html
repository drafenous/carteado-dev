<app-content-box>
  <div class="text-center">
    <h1 class="text-2xl">
      @if(userName$ | async; as userName) { Welcome to Carteado, {{ userName }}!
      } @else { Welcome to Carteado! }
    </h1>

    <div class="w-full sm:w-96 mx-auto">
      <svg
        class="fill-neutral-500/10 hover:fill-neutral-500/20 transition-colors"
        viewBox="0 0 52 52"
        xmlns="http://www.w3.org/2000/svg"
      >
        <g>
          <path
            d="m48.34 10-6.27-2v29.12l7.81-24.12a2.41 2.41 0 0 0 -1.53-3z"
          />

          <path
            d="m20.52 5.59-3.71 1.21-13.15 4.28a2.42 2.42 0 0 0 -1.55 3l10.18 31.35a2.41 2.41 0 0 0 3 1.57l14-4.56 2.85-.94a2.39 2.39 0 0 0 1.56-3l-10.11-31.36a2.4 2.4 0 0 0 -3-1.57z"
          />

          <path
            d="m37.34 34.06v-26.76a2.41 2.41 0 0 0 -2.41-2.41h-7.13a6.07 6.07 0 0 1 .32.8l9.05 27.75a5.24 5.24 0 0 1 .17.62z"
          />
        </g>
      </svg>
    </div>

    <div class="w-full sm:w-96 mx-auto mb-8">
      <input
        type="text"
        placeholder="Whats your name or nickname?"
        class="bg-white rounded block h-16 mx-auto w-full px-4"
        [formControl]="userNameControl"
      />
    </div>

    <p>Choose a option below to start your planning poker.</p>

    <div class="w-full sm:w-96 mx-auto">
      <button
        class="bg-green-500 rounded block h-16 w-full px-16 mt-8 mx-auto text-white hover:bg-green-600 transition-colors"
        (click)="handleCreateRoom($event)"
      >
        Create a room
        <fa-icon [icon]="ICONS.createRoom" [fixedWidth]="true" />
      </button>
      <div class="my-8 text-neutral-500">- OR -</div>

      <input
        type="number"
        placeholder="Enter a room code"
        class="bg-white rounded block h-16 mx-auto w-full px-4"
      />

      <button
        class="bg-green-500 rounded block h-16 w-full px-16 mt-8 mx-auto text-white hover:bg-green-600 transition-colors"
        (click)="handleJoinRoom($event)"
      >
        Join now
        <fa-icon [icon]="ICONS.joinRoom" [fixedWidth]="true" />
      </button>
    </div>
  </div>
</app-content-box>
