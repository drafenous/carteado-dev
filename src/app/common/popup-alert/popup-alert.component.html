@if(showAlert()){
<div
  #PopupAlertBackdrop
  class="fixed inset-0 z-[80] flex items-center justify-center bg-black/55 px-3"
>
  <div
    #PopupAletBox
    [@bounceInOutAnimation]
    role="dialog"
    aria-modal="true"
    tabindex="-1"
    class="surface-panel z-[90] w-full max-w-[calc(100vw-1.5rem)] sm:max-w-md p-4 sm:p-6 md:p-7 rounded-2xl md:rounded-3xl overflow-hidden"
  >
    <div class="mb-3 sm:mb-4">
      <h1 class="text-center text-xl sm:text-2xl md:text-3xl font-semibold text-neutral-900">
        <ng-content select="[title]"></ng-content>
      </h1>
    </div>
    <div class="mb-3 sm:mb-4 overflow-y-auto max-h-[60vh] sm:max-h-[70vh]">
      <ng-content select="[body]"></ng-content>
    </div>
    <div class="">
      <ng-content select="[actions]"></ng-content>
    </div>
  </div>
</div>
}
