<header class="w-full sticky top-0 z-50 pt-2 bg-[var(--table-bg)]">
  <div class="container mx-auto px-4 sm:px-6 lg:px-8 h-14 sm:h-16">
    <div
      class="surface-panel flex justify-between mx-auto h-full px-4 sm:px-6 md:px-8 rounded-2xl md:rounded-3xl overflow-hidden"
    >
    <div class="site-logo h-full flex align-middle items-center gap-2 font-semibold text-neutral-900">
      <svg
        class="header-logo w-5 h-5 fill-neutral-700"
        viewBox="0 0 52 52"
        xmlns="http://www.w3.org/2000/svg"
        aria-hidden="true"
      >
        <g>
          <path
            class="header-logo-card header-logo-card-1"
            d="m48.34 10-6.27-2v29.12l7.81-24.12a2.41 2.41 0 0 0 -1.53-3z"
          />
          <path
            class="header-logo-card header-logo-card-2"
            d="m20.52 5.59-3.71 1.21-13.15 4.28a2.42 2.42 0 0 0 -1.55 3l10.18 31.35a2.41 2.41 0 0 0 3 1.57l14-4.56 2.85-.94a2.39 2.39 0 0 0 1.56-3l-10.11-31.36a2.4 2.4 0 0 0 -3-1.57z"
          />
          <path
            class="header-logo-card header-logo-card-3"
            d="m37.34 34.06v-26.76a2.41 2.41 0 0 0 -2.41-2.41h-7.13a6.07 6.07 0 0 1 .32.8l9.05 27.75a5.24 5.24 0 0 1 .17.62z"
          />
        </g>
      </svg>
      <span>Carteado Dev</span>
    </div>
    <nav class="flex align-middle">
      <app-tooltip text="Home">
      <button
        type="button"
        class="btn-minimal btn-header border-0 px-2 sm:px-4 h-full rounded-none"
        (click)="handleNavClick(['/'])"
      >
        <fa-icon [icon]="ICONS.home" [fixedWidth]="true" />
        <div class="hidden sm:block">Home</div>
      </button>
      </app-tooltip>
      <app-tooltip text="About">
      <button
        type="button"
        class="btn-minimal btn-header border-0 px-2 sm:px-4 h-full rounded-none"
        (click)="handleNavClick(['/about'])"
      >
        <fa-icon [icon]="ICONS.about" [fixedWidth]="true" />
        <div class="hidden sm:block">About</div>
      </button>
      </app-tooltip>
    </nav>
    </div>
  </div>
</header>

<app-popup-alert [showAlert]="showLeaveConfirm">
  <div title>Attention</div>
  <div body class="text-center">
    <p class="text-neutral-700">
      You will be disconnected from the room if you continue. Do you want to proceed?
    </p>
  </div>
  <div actions class="flex gap-4">
    <button
      type="button"
      class="btn-minimal w-full h-12 sm:h-14 md:h-16 font-bold"
      (click)="cancelLeave()"
    >
      <fa-icon [icon]="ICONS.xmark" [fixedWidth]="true" />
      Cancel
    </button>
    <button
      type="button"
      class="w-full h-12 sm:h-14 md:h-16 rounded-lg transition-all font-bold bg-red-600 text-white hover:bg-red-700"
      (click)="confirmLeave()"
    >
      <fa-icon [icon]="ICONS.check" [fixedWidth]="true" />
      Continue
    </button>
  </div>
</app-popup-alert>
